name: Bug report
description: Report a CrystalBio bug found by QA/testing agent
title: "[Area] Short bug description"
labels:
  - type: bug
  - status: needs-triage
body:
  - type: dropdown
    id: role
    attributes:
      label: User role tested
      options:
        - Agent
        - Admin
        - Owner
        - Backend/API
    validations:
      required: true
  - type: input
    id: journey
    attributes:
      label: Journey tested
      placeholder: Agent login → Sales visit → Save visit update
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: test_data
    attributes:
      label: Test data used
      placeholder: Test agent, customer, visit type, dates, files, etc.
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Screenshot, video, console log, API response, or test output.
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: staging, Chrome mobile 390px, commit SHA, backend version
    validations:
      required: true
  - type: textarea
    id: retest
    attributes:
      label: Retest notes after fix
      description: Testing Agent fills this only after retesting.
      placeholder: Retest date, steps repeated, result, evidence.
